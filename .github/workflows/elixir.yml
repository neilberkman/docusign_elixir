name: docusign_elixir CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Earliest supported Elixir series on a current OTP 27 patch
          - elixir: "1.17.3"
            otp: "27.3"
            quality: false
          # Latest 1.18 series
          - elixir: "1.18.4"
            otp: "27.3"
            quality: false
          # Latest 1.19 series with OTP 28
          - elixir: "1.19.5"
            otp: "28.5"
            quality: false
          # Latest 1.20 series with OTP 29
          - elixir: "1.20.1"
            otp: "29.0"
            quality: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-deps-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock', 'mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-deps-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Cache compiled build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-mix-build-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock', 'mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-build-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile app
        run: MIX_ENV=test mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Check formatting
        if: matrix.quality
        run: mix format --check-formatted

      - name: Run Credo
        if: matrix.quality
        run: mix credo --strict

      - name: Run Dialyzer
        if: matrix.quality
        run: mix dialyzer

      - name: Build docs
        if: matrix.quality
        run: mix docs

      - name: Build package
        if: matrix.quality
        run: mix hex.build
